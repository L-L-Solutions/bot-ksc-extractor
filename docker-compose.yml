services:
  playwright-bot:
    image: mcr.microsoft.com/playwright:v1.42.0-jammy
    container_name: bot_ksc_playwright
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
    networks:
      - ksc_network
    depends_on:
      - postgres-db
    command: /bin/sh -c "npm install && node startup.js && node scheduler.js"

  postgres-db:
    image: postgres:16-alpine
    container_name: bot_ksc_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: ksc_dados
      TZ: America/Sao_Paulo
    ports:
      - "5442:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ksc_network

volumes:
  pgdata:

networks:
  ksc_network:
    driver: bridge